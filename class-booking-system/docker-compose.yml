services:
  db:
    image: postgres:15-alpine
    container_name: undoschool-db
    environment:
      POSTGRES_DB: undoschool_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
