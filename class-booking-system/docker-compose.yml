services:
  db:
    image: postgres:15-alpine
    container_name: undoschool-db
    environment:
      POSTGRES_DB: undoschool_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d undoschool_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: class-booking-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/undoschool_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8080

volumes:
  postgres_data:
