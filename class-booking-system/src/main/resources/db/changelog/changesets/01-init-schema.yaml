databaseChangeLog:
  - changeSet:
      id: 20260530-01-v2
      author: Rohan Mahangare
      changes:
        - createTable:
            tableName: courses
            columns:
              - column:
                  name: course_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT

        - createTable:
            tableName: teachers
            columns:
              - column:
                  name: teacher_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

        - createTable:
            tableName: students
            columns:
              - column:
                  name: student_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

        - createTable:
            tableName: offerings
            columns:
              - column:
                  name: offering_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_offering_course
                    referencedTableName: courses
                    referencedColumnNames: course_id
              - column:
                  name: teacher_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_offering_teacher
                    referencedTableName: teachers
                    referencedColumnNames: teacher_id
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: capacity
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: sessions
            columns:
              - column:
                  name: session_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: offering_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_session_offering
                    referencedTableName: offerings
                    referencedColumnNames: offering_id
              - column:
                  name: start_time
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false

        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: booking_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: offering_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_booking_offering
                    referencedTableName: offerings
                    referencedColumnNames: offering_id
              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_booking_student
                    referencedTableName: students
                    referencedColumnNames: student_id
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: CONFIRMED
                  constraints:
                    nullable: false
              - column:
                  name: idempotency_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
