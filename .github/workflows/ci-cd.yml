name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
    paths:
      - 'class-booking-system/src/main/**'
      - 'class-booking-system/pom.xml'
      - 'class-booking-system/Dockerfile'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'class-booking-system/src/main/**'
      - 'class-booking-system/pom.xml'
      - 'class-booking-system/Dockerfile'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: undoschool_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Build and Test
        env:
          DB_URL: jdbc:postgresql://127.0.0.1:5432/undoschool_db
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: |
          cd class-booking-system
          mvn clean package -DskipTests=false

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./class-booking-system
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/class-booking-system:latest
